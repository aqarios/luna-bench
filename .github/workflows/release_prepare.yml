name: Release Prepare
on:
  workflow_call:
    inputs:
      release_type:
        required: true
        type: string
      prerelease:
        required: true
        type: string
    outputs:
      python_version:
        description: "Python version read from .python-version"
        value: ${{ jobs.prepare.outputs.python_version }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      python_version: ${{ steps.python-version.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Validate dispatch branch
        run: |
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "Error: release workflow must be run from main. Current ref: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Read Python version
        id: python-version
        run: |
          PYTHON_VERSION="$(tr -d '[:space:]' < .python-version)"
          if [[ -z "${PYTHON_VERSION}" ]]; then
            echo "Error: .python-version is empty"
            exit 1
          fi
          echo "value=${PYTHON_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate release inputs
        run: |
          if [[ "$RELEASE_TYPE" == "stable" && "$PRERELEASE" != "none" ]]; then
            echo "Error: stable cannot be combined with prerelease"
            exit 1
          fi
          if [[ "$RELEASE_TYPE" == "post" && "$PRERELEASE" != "none" ]]; then
            echo "Error: post cannot be combined with prerelease"
            exit 1
          fi
          if [[ "$RELEASE_TYPE" == "none" && "$PRERELEASE" == "none" ]]; then
            echo "Error: when release_type is 'none', prerelease must be set"
            exit 1
          fi
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
          PRERELEASE: ${{ inputs.prerelease }}
