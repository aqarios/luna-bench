name: Release Publish
on:
  workflow_call:
    inputs:
      release_type:
        required: true
        type: string
      prerelease:
        required: true
        type: string
      python_version:
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Install UV
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ inputs.python_version }}
          activate-environment: false
          enable-cache: true

      - name: Set Version
        run: |
          if [[ "$RELEASE_TYPE" == "none" ]]; then
            uv version --bump "$PRERELEASE"
          elif [[ "$PRERELEASE" != "none" ]]; then
            uv version --bump "$RELEASE_TYPE" --bump "$PRERELEASE"
          else
            uv version --bump "$RELEASE_TYPE"
          fi
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
          PRERELEASE: ${{ inputs.prerelease }}

      - name: Get package version
        id: package-version
        run: |
          VERSION=$(uv version | awk -F'[ @]' '{print $NF}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "branch_name=release/v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "Error: tag v${VERSION} already exists"
            exit 1
          fi
        env:
          VERSION: ${{ steps.package-version.outputs.version }}

      - name: Create PR with version bump
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ${{ steps.package-version.outputs.branch_name }}
          commit-message: "chore(update-version): Updated luna_bench to ${{ steps.package-version.outputs.version }}"
          title: "Update luna_bench version (${{ steps.package-version.outputs.version }})"
          body: |
            Updated luna_bench version to ${{ steps.package-version.outputs.version }}.

            GitHub Release `v${{ steps.package-version.outputs.version }}` has been created automatically with built wheels.

            Install this version with:
            ```
            uv add git+https://github.com/aqarios/luna-bench.git@v${{ steps.package-version.outputs.version }}
            ```
          reviewers: jflxb,Llewe,MaximilianJanetschek

      - name: Build package
        run: |
          rm -rf dist build luna_bench.egg-info
          uv build

      - name: Validate build artifacts
        run: |
          shopt -s nullglob
          wheel_files=(dist/luna_bench-"$VERSION"-*.whl)
          sdist_files=(dist/luna_bench-"$VERSION".tar.gz)

          if [[ ${#wheel_files[@]} -ne 1 ]]; then
            echo "Error: expected exactly one wheel for version $VERSION, got ${#wheel_files[@]}"
            ls -la dist
            exit 1
          fi

          if [[ ${#sdist_files[@]} -ne 1 ]]; then
            echo "Error: expected exactly one sdist for version $VERSION, got ${#sdist_files[@]}"
            ls -la dist
            exit 1
          fi

          for file in "${wheel_files[@]}" "${sdist_files[@]}"; do
            if [[ ! -s "$file" ]]; then
              echo "Error: artifact is empty: $file"
              exit 1
            fi
          done

          unexpected_files=$(find dist -maxdepth 1 -type f \
            ! -name "luna_bench-${VERSION}.tar.gz" \
            ! -name "luna_bench-${VERSION}-*.whl")
          if [[ -n "$unexpected_files" ]]; then
            echo "Error: unexpected artifact(s) found in dist/"
            echo "$unexpected_files"
            exit 1
          fi
        env:
          VERSION: ${{ steps.package-version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package-version.outputs.version }}
          target_commitish: ${{ steps.package-version.outputs.branch_name }}
          name: v${{ steps.package-version.outputs.version }}
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(fromJSON('["rc","alpha","beta","dev"]'), inputs.prerelease) }}
