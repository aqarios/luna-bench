name: Release
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Base version bump: stable=drop prerelease suffix, major/minor/patch/post=increment that segment, none=do not apply a base bump (requires prerelease).'
        type: choice
        required: true
        default: stable
        options:
          - stable
          - major
          - minor
          - patch
          - post
          - none
      prerelease:
        description: 'Optional prerelease bump: rc/beta/alpha/dev. Use none for normal releases. Invalid with stable or post; required when release_type=none.'
        type: choice
        required: false
        default: none
        options:
          - none
          - rc
          - beta
          - alpha
          - dev

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    uses: ./.github/workflows/release_prepare.yml
    with:
      release_type: ${{ inputs.release_type }}
      prerelease: ${{ inputs.prerelease }}

  publish:
    needs: prepare
    uses: ./.github/workflows/release_publish.yml
    with:
      release_type: ${{ inputs.release_type }}
      prerelease: ${{ inputs.prerelease }}
      python_version: ${{ needs.prepare.outputs.python_version }}
    secrets: inherit
