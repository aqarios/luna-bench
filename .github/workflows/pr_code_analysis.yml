name: "PR Code Analysis"
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-test:
    name: "Lint & Test (py${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.13" # Only one version here since we do the checks with tox

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Install Python"
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: "Install uv"
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: "Install the project"
        run: uv sync --all-extras --all-groups

      - name: "Ruff (Linter)"
        run: uv run ruff check --config ruff.toml

      - name: "Ruff (Formater)"
        run: uv run ruff format --check --config ruff.toml

      - name: "Mypy (Type checking)"
        run: uv run mypy --config-file .mypy.ini ./

      - name: "Run tox"
        run: uv run tox run-parallel

      - name: Run Pytest
        run: |
          uv run pytest --junitxml=pytest.xml --cov-config=.coveragerc --cov=luna_bench --cov-report=term-missing:skip-covered tests/unit | tee pytest-coverage.txt
      - name: Pytest coverage comment
        if: always()
        id: coverageComment
        uses: MishaKav/pytest-coverage-comment@main
        with:
          title: Luna-Bench coverage
          badge-title: Coverage
          hide-badge: false
          hide-report: false
          create-new-comment: false
          hide-comment: false
          report-only-changed-files: false
          remove-link-from-badge: false
          pytest-coverage-path: ./pytest-coverage.txt
          junitxml-path: ./pytest.xml
      - name: Fail if coverage is below 98%
        run: uv run coverage report --fail-under=98
