name: "PR Code Analysis"
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      runner-type:
        description: 'Choose where to run the workflow'
        required: true
        default: 'ubuntu-latest'
        type: choice
        options:
          - self-hosted
          - ubuntu-latest

jobs:
  lint:
    name: "Lint"
    uses: ./.github/workflows/templates/lint-template.yml
    with:
      runner-type: ${{ steps.config.outputs.runner-type }}
  test:
    name: "Test"
    uses: ./.github/workflows/templates/test-template.yml
    with:
      runner-type: ${{ steps.config.outputs.runner-type }}
